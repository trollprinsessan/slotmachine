<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Winning Words</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: Arial, Helvetica, sans-serif; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes goldShine {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes gifFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .main-btn {
    border: 6px outset #555;
    background: #000;
    color: #fff;
    cursor: pointer;
    user-select: none;
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.25);
    width: 100%;
    padding: 20px;
    font-size: 26px;
    font-family: 'Times New Roman', Times, Georgia, serif;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.15;
    white-space: nowrap;
  }
  .main-btn:hover { background: #111; }
  .main-btn:active {
    border-style: inset !important;
    box-shadow: none !important;
    transform: translate(1px, 1px) !important;
  }
  .main-btn.gold-state {
    background: linear-gradient(135deg, #b8862d 0%, #d4a843 20%, #f2d675 40%, #c9953a 60%, #d4a843 80%, #b8862d 100%);
    background-size: 200% 100%;
    animation: goldShine 1.5s ease-in-out;
    color: rgba(0,0,0,0.7);
    border-color: #c9953a;
  }

  .slot-card-inset {
    border: 2px inset #e6e6e6;
    background: #fff;
    flex: 1 1 0;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    position: relative;
  }

  .slot-word {
    font-family: Arial, Helvetica, sans-serif;
    font-size: clamp(20px, 2.5vw, 36px);
    font-weight: 400;
    text-transform: uppercase;
    color: #000;
    text-align: center;
    line-height: 1.05;
    user-select: none;
    letter-spacing: -0.01em;
    transition: font-weight 0.3s, opacity 0.3s;
    position: relative;
    z-index: 5;
  }

  .slot-word.faded {
    font-weight: 200;
    opacity: 0.12;
  }

  .fact-panel {
    background: #fff;
    border: 2px inset #e6e6e6;
    padding: 10px 18px;
    min-height: 0;
    flex: 0 0 auto;
    overflow: hidden;
  }

  .fact-panel p {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: #000;
    line-height: 1.5;
    margin: 0;
  }

  .fact-panel p strong { font-weight: 700; }

  .cursor {
    display: inline-block;
    width: 6px;
    height: 14px;
    background: #000;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }

  .ww-container {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ww-slot {
    display: flex;
    flex-direction: row;
    gap: 10px;
  }

  .ww-sidebar {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ww-outer {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .gif-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 3;
    animation: gifFadeIn 0.3s ease forwards;
  }

  @media (max-width: 600px) {
    .ww-outer { padding: 12px; }
    .ww-container { gap: 8px; }
    .ww-sidebar { gap: 8px; }
    .ww-slot { gap: 8px; }
    .slot-card-inset { padding: 12px; }
    .main-btn { font-size: 13px; white-space: normal; padding: 12px 14px; }
    .slot-word { font-size: clamp(13px, 4.5vw, 22px) !important; }
  }
</style>
</head>
<body>
<div class="ww-outer">
  <div class="ww-container">
    <div class="ww-slot">
      <div class="slot-card-inset" id="fight-card">
        <span class="slot-word" id="fight-word">CHOLERA-FREE WATER</span>
      </div>
      <div class="slot-card-inset" id="win-card">
        <span class="slot-word" id="win-word">WATER</span>
      </div>
    </div>
    <div class="ww-sidebar">
      <button class="main-btn" id="spin-btn">PRESS TO GENERATE A WINNING WORD</button>
      <div class="fact-panel" id="fact-panel">
        <span class="cursor"></span>
      </div>
    </div>
  </div>
</div>

<script>
const PAIRS = [
  { fight: "Cholera-free water", win: "Water", fact: "In 1854, John Snow traced a cholera outbreak to a single water pump on Broad Street, London. He removed the handle. The epidemic stopped. Today we just turn on the tap." },
  { fight: "Climate action", win: "Cheap energy", fact: "Solar energy costs dropped 90% in a decade. In 2025, renewables were cheaper than fossil fuels in over 90% of new installations worldwide." },
  { fight: "Labor rights", win: "Saturday", fact: "The five-day work week was won through decades of strikes, protests, and deaths. Henry Ford adopted it in 1926, not out of kindness, but because rested workers made more cars." },
  { fight: "Child liberation", win: "School", fact: "In 1900, 18% of American workers were under 16. It took until 1938 for federal law to meaningfully restrict child labor. Now we call it fourth grade." },
  { fight: "Pandemic prevention", win: "Vaccine", fact: "Smallpox killed 300 million people in the 20th century alone. A global vaccination campaign eradicated it by 1980. The last natural case was a hospital cook in Somalia." },
  { fight: "Food safety regulation", win: "Expiry date", fact: "Upton Sinclair wrote The Jungle in 1906 to expose worker exploitation. Instead, readers were horrified by the meatpacking. The Pure Food and Drug Act passed that same year." },
];

const GIF_TYPES = ["confetti", "clapping", "shooting_star"];
const GIF_MAP = { confetti: "confetti.gif", clapping: "clapping.gif", shooting_star: "shooting.gif" };

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const allFightWords = PAIRS.map(p => p.fight.toUpperCase());
const allWinWords = PAIRS.map(p => p.win.toUpperCase());

let order = shuffle(PAIRS);
let currentIndex = 0;
let isSpinning = false;
let typewriterInterval = null;
let gifTypeIndex = 0;

const fightWordEl = document.getElementById('fight-word');
const winWordEl = document.getElementById('win-word');
const winCard = document.getElementById('win-card');
const spinBtn = document.getElementById('spin-btn');
const factPanel = document.getElementById('fact-panel');

function clearGifs() {
  winCard.querySelectorAll('.gif-overlay').forEach(el => el.remove());
}

function showGif(type) {
  clearGifs();
  const src = 'gifsforyou/' + GIF_MAP[type];

  if (type === 'confetti') {
    const top = document.createElement('img');
    top.src = src; top.className = 'gif-overlay';
    Object.assign(top.style, { top: 0, left: 0, width: '100%', height: '50%', objectFit: 'cover', objectPosition: 'center top' });
    const bot = document.createElement('img');
    bot.src = src; bot.className = 'gif-overlay';
    Object.assign(bot.style, { bottom: 0, left: 0, width: '100%', height: '50%', objectFit: 'cover', objectPosition: 'center top', transform: 'scaleY(-1)', animationDelay: '0.1s' });
    winCard.append(top, bot);
  } else if (type === 'clapping') {
    const bot = document.createElement('img');
    bot.src = src; bot.className = 'gif-overlay';
    Object.assign(bot.style, { bottom: 0, left: 0, width: '100%', height: '50%', objectFit: 'cover', objectPosition: 'center bottom' });
    const top = document.createElement('img');
    top.src = src; top.className = 'gif-overlay';
    Object.assign(top.style, { top: 0, left: 0, width: '100%', height: '50%', objectFit: 'cover', objectPosition: 'center top', transform: 'scaleY(-1)', animationDelay: '0.1s' });
    winCard.append(bot, top);
  } else if (type === 'shooting_star') {
    const img = document.createElement('img');
    img.src = src; img.className = 'gif-overlay';
    Object.assign(img.style, { top: '50%', left: '50%', width: '120%', height: '120%', transform: 'translate(-50%, -50%)', objectFit: 'contain' });
    winCard.append(img);
  }
}

function scramble(el, targetText, allWords, duration, onDone) {
  const others = allWords.filter(w => w.toUpperCase() !== targetText.toUpperCase());
  const start = Date.now();
  let lastSwap = 0;
  let raf;

  function animate() {
    const elapsed = Date.now() - start;
    if (elapsed >= duration) {
      el.textContent = targetText.toUpperCase();
      if (onDone) onDone();
      return;
    }
    if (elapsed - lastSwap > 120) {
      lastSwap = elapsed;
      el.textContent = others[Math.floor(Math.random() * others.length)].toUpperCase();
    }
    raf = requestAnimationFrame(animate);
  }
  raf = requestAnimationFrame(animate);
  return () => cancelAnimationFrame(raf);
}

function typewrite(text, speed = 8) {
  clearInterval(typewriterInterval);
  const firstDot = text.indexOf('. ');
  const leadEnd = firstDot > 0 ? firstDot + 1 : text.length;
  let i = 0;
  factPanel.innerHTML = '';

  typewriterInterval = setInterval(() => {
    i++;
    const typed = text.slice(0, i);
    const lead = typed.slice(0, Math.min(typed.length, leadEnd));
    const rest = typed.length > leadEnd + 1 ? ' ' + typed.slice(leadEnd + 1) : '';
    factPanel.innerHTML = '<p><strong>' + lead + '</strong>' + (rest ? '<span>' + rest + '</span>' : '') + '</p>';
    if (i >= text.length) clearInterval(typewriterInterval);
  }, speed);
}

function spin() {
  if (isSpinning) return;
  isSpinning = true;
  clearInterval(typewriterInterval);
  clearGifs();

  fightWordEl.classList.remove('faded');
  factPanel.innerHTML = '<span>⏳</span>';
  spinBtn.classList.remove('gold-state');
  spinBtn.textContent = 'PRESS TO GENERATE A WINNING WORD';
  spinBtn.style.fontFamily = "'Times New Roman', Times, Georgia, serif";

  currentIndex = (currentIndex + 1) % order.length;
  if (currentIndex === 0) order = shuffle(PAIRS);

  const current = order[currentIndex];
  gifTypeIndex = (gifTypeIndex + 1) % GIF_TYPES.length;

  scramble(fightWordEl, current.fight, allFightWords, 1400, null);
  scramble(winWordEl, current.win, allWinWords, 1600, () => {
    isSpinning = false;

    setTimeout(() => {
      fightWordEl.classList.add('faded');
      showGif(GIF_TYPES[gifTypeIndex]);

      spinBtn.classList.add('gold-state');
      spinBtn.textContent = 'WINNER!';
      spinBtn.style.fontFamily = 'Arial, Helvetica, sans-serif';

      factPanel.innerHTML = '<span class="cursor"></span>';
      setTimeout(() => typewrite(current.fact, 8), 500);

      setTimeout(() => {
        spinBtn.classList.remove('gold-state');
        spinBtn.textContent = 'PRESS TO GENERATE A WINNING WORD';
        spinBtn.style.fontFamily = "'Times New Roman', Times, Georgia, serif";
      }, 1100);
    }, 250);
  });
}

spinBtn.addEventListener('click', spin);

const first = order[currentIndex];
fightWordEl.textContent = first.fight.toUpperCase();
winWordEl.textContent = first.win.toUpperCase();
factPanel.innerHTML = '<span class="cursor"></span>';
</script>
</body>
</html>
