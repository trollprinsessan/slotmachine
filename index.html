<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Winning Words</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; font-family: Arial, Helvetica, sans-serif; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  @keyframes gifFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes goldShine {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* Main button */
  .main-btn {
    border: 6px outset #555;
    background: #000;
    color: #fff;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    box-shadow: 2px 3px 8px rgba(0,0,0,0.25);
  }
  .main-btn:hover {
    background: #111;
  }
  .main-btn:active {
    border-style: inset !important;
    box-shadow: none !important;
    transform: translate(1px, 1px) !important;
  }

  /* Gold state */
  .main-btn.gold-state {
    background: linear-gradient(135deg, #b8862d 0%, #d4a843 20%, #f2d675 40%, #c9953a 60%, #d4a843 80%, #b8862d 100%);
    background-size: 200% 100%;
    animation: goldShine 1.5s ease-in-out;
    color: rgba(0,0,0,0.7);
    border-color: #c9953a;
  }

  /* Inset word card */
  .slot-card-inset {
    border: 2px inset #e6e6e6;
    background: #fff;
  }

  /* Fact panel — inset */
  .fact-panel {
    background: #fff;
    border: 2px inset #e6e6e6;
  }

  /* Layout: stacked vertically */
  .ww-container {
    width: 100%;
    max-width: 820px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ww-sidebar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    order: 1;
  }
  .ww-slot {
    display: flex;
    flex-direction: row;
    order: 0;
    gap: 10px;
  }
  .ww-slot .slot-card-inset {
    flex: 1 1 0;
    aspect-ratio: 1 / 1;
    min-height: 0;
  }

  @media (max-width: 600px) {
    .ww-container {
      flex-direction: column;
      gap: 8px;
    }
    .ww-sidebar {
      gap: 8px;
      order: 1;
    }
    .ww-slot {
      flex-direction: column;
      order: 0;
      gap: 8px;
    }
    .ww-slot .slot-card-inset {
      aspect-ratio: auto !important;
      min-height: 82vw !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const PAIRS = [
  { fight: "Cholera-free water", win: "Water", fact: "In 1854, John Snow traced a cholera outbreak to a single water pump on Broad Street, London. He removed the handle. The epidemic stopped. Today we just turn on the tap." },
  { fight: "Climate action", win: "Cheap energy", fact: "Solar energy costs dropped 90% in a decade. In 2025, renewables were cheaper than fossil fuels in over 90% of new installations worldwide." },
  { fight: "Labor rights", win: "Saturday", fact: "The five-day work week was won through decades of strikes, protests, and deaths. Henry Ford adopted it in 1926\u2014not out of kindness, but because rested workers made more cars." },
  { fight: "Child liberation", win: "School", fact: "In 1900, 18% of American workers were under 16. It took until 1938 for federal law to meaningfully restrict child labor. Now we call it fourth grade." },
  { fight: "Pandemic prevention", win: "Vaccine", fact: "Smallpox killed 300 million people in the 20th century alone. A global vaccination campaign eradicated it by 1980. The last natural case was a hospital cook in Somalia." },
  { fight: "Food safety regulation", win: "Expiry date", fact: "Upton Sinclair wrote The Jungle in 1906 to expose worker exploitation. Instead, readers were horrified by the meatpacking. The Pure Food and Drug Act passed that same year." },
];

const GIF_TYPES = ["confetti", "clapping", "shooting_star"];
const GIF_PATH = "gifsforyou/";

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function useWordScramble(targetText, allWords, isScrambling, duration = 1600) {
  const [display, setDisplay] = useState(targetText);
  const frameRef = useRef(null);
  const startRef = useRef(null);
  useEffect(() => {
    if (!isScrambling) { setDisplay(targetText); return; }
    startRef.current = Date.now();
    const otherWords = allWords.filter(w => w !== targetText);
    let lastSwap = 0;
    const animate = () => {
      const elapsed = Date.now() - startRef.current;
      if (Math.min(elapsed / duration, 1) >= 1) { setDisplay(targetText); return; }
      if (elapsed - lastSwap > 120) {
        lastSwap = elapsed;
        setDisplay(otherWords[Math.floor(Math.random() * otherWords.length)]);
      }
      frameRef.current = requestAnimationFrame(animate);
    };
    frameRef.current = requestAnimationFrame(animate);
    return () => { if (frameRef.current) cancelAnimationFrame(frameRef.current); };
  }, [targetText, isScrambling, duration, allWords]);
  return display;
}

function useTypewriter(text, active, speed = 30) {
  const [displayed, setDisplayed] = useState("");
  const [isTyping, setIsTyping] = useState(false);
  const indexRef = useRef(0);
  useEffect(() => {
    if (!active) { setDisplayed(""); indexRef.current = 0; setIsTyping(false); return; }
    indexRef.current = 0; setDisplayed(""); setIsTyping(true);
    const interval = setInterval(() => {
      indexRef.current++;
      if (indexRef.current <= text.length) setDisplayed(text.slice(0, indexRef.current));
      else { clearInterval(interval); setIsTyping(false); }
    }, speed);
    return () => clearInterval(interval);
  }, [text, active, speed]);
  return { displayed, isTyping };
}

function useIsMobile(breakpoint = 600) {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth <= breakpoint);
  useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, [breakpoint]);
  return isMobile;
}

function CelebrationGif({ type, show }) {
  if (!show) return null;
  const gifMap = { confetti: "confetti.gif", clapping: "clapping.gif", shooting_star: "shooting.gif" };

  if (type === "clapping") {
    return (<>
      <img src={`${GIF_PATH}${gifMap[type]}`} alt="" style={{
        position:"absolute",bottom:0,left:0,width:"100%",height:"50%",
        objectFit:"cover",objectPosition:"center bottom",
        zIndex:3,pointerEvents:"none",animation:"gifFadeIn 0.3s ease forwards",
      }}/>
      <img src={`${GIF_PATH}${gifMap[type]}`} alt="" style={{
        position:"absolute",top:0,left:0,width:"100%",height:"50%",
        objectFit:"cover",objectPosition:"center top",transform:"scaleY(-1)",
        zIndex:3,pointerEvents:"none",animation:"gifFadeIn 0.3s ease 0.1s both",
      }}/>
    </>);
  }
  if (type === "confetti") {
    return (<>
      <img src={`${GIF_PATH}${gifMap[type]}`} alt="" style={{
        position:"absolute",top:0,left:0,width:"100%",height:"50%",
        objectFit:"cover",objectPosition:"center top",
        zIndex:3,pointerEvents:"none",animation:"gifFadeIn 0.3s ease forwards",
      }}/>
      <img src={`${GIF_PATH}${gifMap[type]}`} alt="" style={{
        position:"absolute",bottom:0,left:0,width:"100%",height:"50%",
        objectFit:"cover",objectPosition:"center top",transform:"scaleY(-1)",
        zIndex:3,pointerEvents:"none",animation:"gifFadeIn 0.3s ease 0.1s both",
      }}/>
    </>);
  }
  if (type === "shooting_star") {
    return (
      <img src={`${GIF_PATH}${gifMap[type]}`} alt="" style={{
        position:"absolute",top:"50%",left:"50%",width:"120%",height:"120%",
        transform:"translate(-50%,-50%)",objectFit:"contain",
        zIndex:3,pointerEvents:"none",animation:"gifFadeIn 0.3s ease forwards",
      }}/>
    );
  }
  return null;
}

function VocabularyOfWinning() {
  const [currentIndex, setCurrentIndex] = useState(0);
  const [isSpinning, setIsSpinning] = useState(false);
  const [isWinner, setIsWinner] = useState(false);
  const [order, setOrder] = useState(() => shuffle(PAIRS));
  const [loserFade, setLoserFade] = useState(false);
  const [showCelebration, setShowCelebration] = useState(false);
  const [showFact, setShowFact] = useState(false);
  const [gifIndex, setGifIndex] = useState(0);
  const [btnGoldFlash, setBtnGoldFlash] = useState(false);
  const [goldFading, setGoldFading] = useState(false);

  const isMobile = useIsMobile(600);

  const allFightWords = PAIRS.map(p => p.fight);
  const allWinWords = PAIRS.map(p => p.win);

  const spin = useCallback(() => {
    if (isSpinning) return;
    setIsWinner(false); setLoserFade(false); setShowCelebration(false);
    setShowFact(false); setIsSpinning(true);
    setBtnGoldFlash(false); setGoldFading(false);

    const nextIndex = (currentIndex + 1) % order.length;
    if (nextIndex === 0) setOrder(shuffle(PAIRS));
    setCurrentIndex(nextIndex);
    setGifIndex(prev => (prev + 1) % GIF_TYPES.length);

    setTimeout(() => {
      setIsSpinning(false);
      setTimeout(() => {
        setIsWinner(true); setShowCelebration(true);
        setBtnGoldFlash(true);
        setTimeout(() => { setLoserFade(true); setShowFact(true); }, 500);
        // Gold flash lasts 1.1s then both text and color revert together
        setTimeout(() => {
          setBtnGoldFlash(false);
          setGoldFading(false);
        }, 1100);
      }, 250);
    }, 1600);
  }, [isSpinning, currentIndex, order]);

  const current = order[currentIndex];
  const fightText = useWordScramble(current.fight, allFightWords, isSpinning, 1400);
  const winText = useWordScramble(current.win, allWinWords, isSpinning, 1600);
  const factText = current.fact;
  const { displayed: typedFact, isTyping } = useTypewriter(factText, showFact, 8);

  const winFontSize = isMobile ? "clamp(16px, 5vw, 26px)" : "clamp(20px, 2.5vw, 36px)";

  // Split fact into first sentence + rest
  const firstDot = factText.indexOf('. ');
  const factLead = firstDot > 0 ? factText.slice(0, firstDot + 1) : factText;

  const isGold = btnGoldFlash || goldFading;
  const btnText = btnGoldFlash ? "WINNER!" : "PRESS TO GENERATE A WINNING WORD";

  return (
    <div style={{
      background: "#fff",
      display: "flex", flexDirection: "column",
      alignItems: "center",
      padding: "20px",
    }}>

      <div className="ww-container">

        {/* Word cards row */}
        <div className="ww-slot">
          {/* Fight word — inset card */}
          <div className="slot-card-inset" style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: isMobile ? "16px 10px" : "24px",
            overflow: "hidden",
          }}>
            <span style={{
              fontFamily: "Arial, Helvetica, sans-serif",
              fontSize: winFontSize,
              fontWeight: loserFade ? 200 : 400,
              textTransform: "uppercase",
              color: "#000", textAlign: "center",
              lineHeight: 1.05, userSelect: "none",
              letterSpacing: "-0.01em",
              opacity: loserFade ? 0.12 : 1,
              transition: "font-weight 0.3s, opacity 0.3s",
            }}>{fightText}</span>
          </div>

          {/* Win word — inset card with transparent border overlay */}
          <div className="slot-card-inset" style={{
            display: "flex", alignItems: "center", justifyContent: "center",
            padding: isMobile ? "16px 10px" : "24px",
            position: "relative", overflow: "hidden",
          }}>
            <CelebrationGif type={GIF_TYPES[gifIndex]} show={showCelebration} />
            <span style={{
              fontFamily: "Arial, Helvetica, sans-serif",
              fontSize: winFontSize,
              fontWeight: 400,
              textTransform: "uppercase",
              color: "#000", textAlign: "center",
              lineHeight: 1.05, userSelect: "none",
              letterSpacing: "-0.01em",
              position: "relative", zIndex: 5,
              transition: "font-weight 0.3s",
            }}>{winText}</span>
          </div>
        </div>

        {/* Button + Fact below */}
        <div className="ww-sidebar">
          <button onClick={spin}
            className={`main-btn${isGold ? " gold-state" : ""}`}
            style={{
              width: "100%",
              padding: isMobile ? "14px 16px" : "20px 20px",
              fontFamily: btnGoldFlash
                ? "Arial, Helvetica, sans-serif"
                : "'Times New Roman', Times, Georgia, serif",
              fontSize: isMobile ? 13 : 26,
              fontWeight: 400,
              letterSpacing: "0.06em",
              textTransform: "uppercase",
              textAlign: "center",
              lineHeight: 1.15,
              whiteSpace: isMobile ? "normal" : "nowrap",
            }}
          >
            {btnText}
          </button>

          <div
            className="fact-panel"
            style={{
              padding: "10px 18px",
              minHeight: 0,
              flex: "0 0 auto",
              overflow: "hidden",
            }}
          >
            {showFact ? (
              <p style={{
                fontFamily: "Arial, Helvetica, sans-serif",
                fontSize: 13,
                fontWeight: 400, letterSpacing: "0.01em",
                color: "#000", lineHeight: 1.5, margin: 0,
              }}>
                <strong style={{ fontWeight: 700 }}>{typedFact.slice(0, Math.min(typedFact.length, factLead.length))}</strong>
                {typedFact.length > factLead.length + 1 ? <span style={{ fontWeight: 400 }}>{" "}{typedFact.slice(factLead.length + 1)}</span> : null}
              </p>
            ) : (
              <span style={{
                fontFamily: "Arial, Helvetica, sans-serif",
                fontSize: 14, color: "#000",
              }}>{isSpinning ? "\u23F3" : <span style={{
                  display: "inline-block", width: 6, height: 14,
                  background: "#000",
                  animation: "blink 1s step-end infinite", verticalAlign: "text-bottom",
                }} />}</span>
            )}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<VocabularyOfWinning />);
</script>
</body>
</html>
